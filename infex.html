<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>دعوة خطوبة</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- ورد -->
  <div class="flowers">
    <span>🌹</span>
    <span>🌸</span>
    <span>🌺</span>
    <span>🌷</span>
  </div>

  <div class="container" id="envelope">

    <!-- الجواب -->
    <div class="letter">

      <div class="text">

        <h1>مختار & رنا</h1>

        <p class="invite">
          يتشرفان بدعوتكم لحضور حفل الخطوبة
        </p>

        <div class="details">
          <p>📍 قاعة الأمراء</p>
          <p>📅 الجمعة 20 يونيو 2026</p>
          <p>🕗 الساعة 8 مساءً</p>
        </div>

        <div class="footer">
          حضوركم يسعدنا ❤️
        </div>

      </div>

    </div>

    <!-- الظرف -->
    <div class="envelope">

      <div class="back"></div>

      <div class="front"></div>

      <div class="flap"></div>

    </div>

  </div>

  <p class="click">
    اضغط على الظرف ✨
  </p>

  <script src="script.js"></script>

</body>

</html>
